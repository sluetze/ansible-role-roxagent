---
- name: Seed DNF history with update
  ansible.builtin.dnf:
    name: '*'
    state: latest
  when: roxagent_dnf_seed_history | bool

- name: Roxagent systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Roxagent run scan
  ansible.builtin.systemd:
    name: roxagent.service
    state: started
  when: roxagent_run_initial_scan | bool
